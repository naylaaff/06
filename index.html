<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Render Data</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        .card {
            border: 1px solid #333;
            padding: 10px;
            margin: 5px;
            width: 150px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
        }
        button {
            margin: 5px;
            padding: 8px 12px;
        }
        table {
            border-collapse: collapse;
            margin-top: 10px;
        }
        table, th, td {
            border: 1px solid black;
            padding: 8px;
        }
    </style>
</head>
<body>

    <h2>Menu</h2>
    <button onclick="renderTable()">Table</button>
    <button onclick="renderList()">List</button>
    <button onclick="renderCard()">Card</button>

    <div id="output"></div>

    <script>
        // ======================
        // DATA (ARRAY)
        // ======================
        const data = [
            {id: 1, nama: "Satu"},
            {id: 2, nama: "Dua"},
            {id: 3, nama: "Tiga"},
            {id: 4, nama: "Empat"},
            {id: 5, nama: "Lima"},
            {id: 6, nama: "Enam"},
            {id: 7, nama: "Tujuh"},
            {id: 8, nama: "Delapan"},
            {id: 9, nama: "Sembilan"},
        ];

        // ======================
        // FUNCTION RENDER (DRY)
        // ======================

        function clearOutput() {
            document.getElementById("output").innerHTML = "";
        }

        function renderTable() {
            clearOutput();

            let html = "<table><tr><th>ID</th><th>Nama</th></tr>";

            data.forEach(item => {
                html += `<tr>
                            <td>${item.id}</td>
                            <td>${item.nama}</td>
                         </tr>`;
            });

            html += "</table>";
            document.getElementById("output").innerHTML = html;
        }

        function renderList() {
            clearOutput();

            let html = "<ul>";

            data.forEach(item => {
                html += `<li>${item.nama}</li>`;
            });

            html += "</ul>";
            document.getElementById("output").innerHTML = html;
        }

        function renderCard() {
            clearOutput();

            let html = '<div class="container">';

            data.forEach(item => {
                html += `
                    <div class="card">
                        <p><b>ID:</b> ${item.id}</p>
                        <p><b>Nama:</b> ${item.nama}</p>
                    </div>
                `;
            });

            html += "</div>";
            document.getElementById("output").innerHTML = html;
        }
    </script>

</body>
</html>
