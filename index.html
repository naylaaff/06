<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Render Table</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h2 {
            margin-bottom: 10px;
        }

        table {
            border-collapse: collapse;
            width: 60%;
        }

        th, td {
            border: 1px solid #000;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <h2>Data Mahasiswa</h2>

    <table>
        <thead>
            <tr id="header"></tr>
        </thead>
        <tbody id="body"></tbody>
    </table>

    <script>
        // =========================
        // DATA (SCALABLE)
        // =========================
        const data = [
            { id: 1, nama: "Andi", jurusan: "Informatika" },
            { id: 2, nama: "Sari", jurusan: "Sistem Informasi" },
            { id: 3, nama: "Rina", jurusan: "Teknik Komputer" }
        ];

        // =========================
        // FUNCTION (DRY & REUSE)
        // =========================
        function renderTable(data, columns) {
            const header = document.getElementById("header");
            const body = document.getElementById("body");

            header.innerHTML = "";
            body.innerHTML = "";

            // HEADER
            columns.forEach(col => {
                const th = document.createElement("th");
                th.textContent = col;
                header.appendChild(th);
            });

            // BODY
            data.forEach(item => {
                const tr = document.createElement("tr");

                columns.forEach(col => {
                    const td = document.createElement("td");
                    td.textContent = item[col] ?? "-";
                    tr.appendChild(td);
                });

                body.appendChild(tr);
            });
        }

        // =========================
        // MODULE (MODULAR)
        // =========================
        function init() {
            const columns = ["id", "nama", "jurusan"];
            renderTable(data, columns);
        }

        // =========================
        // RUN
        // =========================
        init();
    </script>

</body>
</html>
